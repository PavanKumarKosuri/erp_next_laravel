version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: next-erp-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - next-erp-network
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: next-erp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - next-erp-network
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    container_name: next-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-next_erp}
      POSTGRES_USER: ${DB_USERNAME:-next_erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - next-erp-network

  redis:
    image: redis:7-alpine
    container_name: next-erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - next-erp-network

networks:
  next-erp-network:
    driver: bridge

volumes:
  postgres_data:
